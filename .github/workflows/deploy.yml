name: QERCAS CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    name: Test Django Backend & AI Modules
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/qercas_project/requirements.txt

      - name: Run Django System Checks & Migrations
        run: |
          cd backend/qercas_project
          python manage.py check
          python manage.py migrate

  test-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Frontend Asset Bundle
        run: |
          cd frontend/frontend
          npm install
          npm run build

  deploy-to-ec2:
    name: Auto-Deploy to AWS EC2
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands on AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/qercas
            git pull origin main || git pull origin master
            source backend/.venv/bin/activate
            pip install -r backend/qercas_project/requirements.txt
            cd backend/qercas_project
            python manage.py migrate
            python manage.py collectstatic --noinput
            sudo systemctl restart qercas-backend
            sudo systemctl restart qercas-celery
            sudo systemctl restart qercas-simulator
            cd ../../frontend/frontend
            npm install
            npm run build
            sudo systemctl restart nginx
